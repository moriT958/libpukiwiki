version: "3"

tasks:
  run:
    desc: Run md2pw
    cmds:
      - go run ./cmd/md2pw {{.CLI_ARGS}}

  build:
    desc: Build md2pw
    cmds:
      - go build ./...
      - go build -o md2pw ./cmd/md2pw

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  release:
    desc: Release md2pw binary in local
    cmds:
      - goreleaser check
      - goreleaser release --snapshot --clean

  deploy:
    desc: Deploy md2pw on GitHub
    vars:
      TAG:
        sh: echo "{{.CLI_ARGS}}" | sed -n 's/.*--tag \([^ ]*\).*/\1/p'
    cmds:
      - |
        if [[ -z "{{.TAG}}" ]]; then
          echo "Error: --tag is required"
          exit 1
        fi
      - git tag {{.TAG}}
      - git push origin {{.TAG}}
